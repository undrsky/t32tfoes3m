name: Rebuild dashboard
on:
  push:
    branches: [main]
    paths: ['applications_tracker.csv', 'build_dashboard.py', '.github/workflows/rebuild-dashboard.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - run: |
          python build_dashboard.py
          cp dashboard.html index.html
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html dashboard.html
          git diff --cached --quiet || (git commit -m "Auto-rebuild dashboard [skip ci]" && git push)
